{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PrepVerse{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block extra_css %}{% endblock %}
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #050505; color: #fff; overflow-x: hidden; }

        /* Modern Glass Navbar */
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .navbar.scrolled {
            top: 0;
            width: 100%;
            border-radius: 0;
            background: rgba(10, 10, 10, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 5%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            text-decoration: none;
            color: #fff;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo i { color: #2af598; font-size: 1.2rem; }
        .logo span { background: linear-gradient(90deg, #fff, #2af598); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-links { display: flex; align-items: center; gap: 35px; }
        .nav-links a {
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
            position: relative;
        }
        .nav-links a:after {
            content: "";
            position: absolute;
            bottom: -5px; left: 0; width: 0; height: 2px;
            background: #2af598;
            transition: 0.3s;
        }
        .nav-links a:hover { color: #fff; }
        .nav-links a:hover:after { width: 100%; }
        .nav-links a.active { color: #fff; }
        .nav-links a.active:after { width: 100%; }

        .nav-actions { display: flex; align-items: center; gap: 20px; }
        .search-trigger { color: rgba(255,255,255,0.6); cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .search-trigger:hover { color: #2af598; }

        .login-btn {
            padding: 10px 25px;
            background: #fff;
            color: #000;
            border-radius: 14px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); background: #2af598; }

        /* Main Content Padding for Fixed Nav */
        main { padding-top: 120px; }

        @media (max-width: 992px) {
            .nav-links { display: none; }
            .navbar { width: 95%; padding: 10px 20px; }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <a href="{% url 'home' %}" class="logo">
            <i class="fas fa-bolt"></i>
            <span>PrepVerse</span>
        </a>

        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'courses' %}">Courses</a>
            <a href="{% url 'practice' %}">Practice</a>
            <a href="{% url 'mock_test' %}">Mock Test</a>
            <a href="{% url 'blog' %}">Blog</a>
            <a href="#">Community</a>
            <a href="#">About</a>
        </div>

        <div class="nav-actions">
            <div class="search-trigger"><i class="fas fa-search"></i></div>
            <a href="{% url 'login' %}" class="login-btn">Log In</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
    <script>
        window.addEventListener('scroll', function() {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // Set active nav link dynamically
        document.querySelectorAll('.nav-links a').forEach(link => {
            const href = link.getAttribute('href');
            if (href && href !== '#' && (window.location.pathname === href || (href !== '/' && window.location.pathname.startsWith(href)))) {
                link.classList.add('active');
            } else if (href === '/' && window.location.pathname === '/') {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    </script>
</body>
</html>
